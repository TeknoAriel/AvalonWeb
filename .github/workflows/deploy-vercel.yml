# Deploy a producción en Vercel — solo **avalon-premier** desde Actions.
#
# Proyectos Vercel que usás: **avalonweb** (principal) + **avalon-premier** (Premier).
# El código del principal está en `apps/avalon-propiedades` pero el slug en Vercel es **avalonweb**;
# publicalo con Git→Vercel en el dashboard (no hay job de Actions para avalonweb).
#
# Secret: VERCEL_TOKEN (https://vercel.com/account/tokens)
#
# pull → build --prod → deploy --prebuilt. PATH explícito en build evita spawn sh ENOENT en algunos runners.

name: Deploy Vercel (Premier)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-premier
  cancel-in-progress: true

env:
  VERCEL_TEAM: teknoariels-projects
  APP_DIR: apps/avalon-premier
  VERCEL_PROJECT: avalon-premier

jobs:
  deploy-premier:
    name: avalon-premier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comprobar VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo '::error::Falta el secret VERCEL_TOKEN (GitHub → Settings → Secrets and variables → Actions)'
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      - name: Vercel link
        working-directory: ${{ env.APP_DIR }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 link --yes \
            --project="${{ env.VERCEL_PROJECT }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel pull (production)
        working-directory: ${{ env.APP_DIR }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 pull --yes \
            --environment=production \
            --token="$VERCEL_TOKEN"

      - name: Vercel build (prod)
        id: vbuild
        working-directory: ${{ env.APP_DIR }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192
          # Evita "spawn sh ENOENT" si el CLI hijo hereda un PATH incompleto.
          PATH: /bin:/usr/bin:/usr/local/bin:${{ env.PATH }}
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.ci-logs"
          npx vercel@50.32.3 build --prod \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN" 2>&1 | tee "${GITHUB_WORKSPACE}/.ci-logs/vercel-build-premier.log"

      - name: Upload Vercel build log on failure
        if: always() && steps.vbuild.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vercel-build-log-avalon-premier
          path: .ci-logs/vercel-build-premier.log

      - name: Vercel deploy (prebuilt prod)
        if: success()
        working-directory: ${{ env.APP_DIR }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PATH: /bin:/usr/bin:/usr/local/bin:${{ env.PATH }}
        run: |
          set -eu
          npx vercel@50.32.3 deploy --prebuilt --prod --yes --logs \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"
