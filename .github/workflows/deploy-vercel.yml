# Deploy **avalon-premier** a producción (build en Vercel). Un solo paso: `vercel deploy`.
# No `vercel link` (evita fallos por slug de team / proyecto).
#
# Secrets en GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN        https://vercel.com/account/tokens
#   VERCEL_ORG_ID       Vercel → team → Settings → Team ID (o el de .vercel/project.json tras `vercel link` local)
#   VERCEL_PROJECT_ID   Vercel → proyecto avalon-premier → Settings → General → Project ID

name: Deploy Vercel (Premier)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-premier:
    name: avalon-premier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy producción
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -eu
          : "${VERCEL_TOKEN:?Definí el secret VERCEL_TOKEN en GitHub Actions}"
          : "${VERCEL_ORG_ID:?Definí el secret VERCEL_ORG_ID (Team ID en Vercel)}"
          : "${VERCEL_PROJECT_ID:?Definí el secret VERCEL_PROJECT_ID (Project ID del proyecto avalon-premier)}"
          npx --yes vercel@51.6.1 deploy --prod --yes --logs --cwd apps/avalon-premier
