# Deploy a producción en Vercel (ambos sitios del monorepo).
# Secret: VERCEL_TOKEN (https://vercel.com/account/tokens)
#
# pull → build --prod → deploy --prebuilt (documentación Vercel + Actions).
# - working-directory en cada app: coincide con vercel.json (cd ../.. al monorepo).
# - fetch-depth 0 + pull sin --git-config=false (checkout de Actions).
# - NODE_OPTIONS en build (OOM).
# - Si falla el build, se sube un artefacto con el log completo del CLI.

name: Deploy Vercel (Premier + Propiedades)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-monorepo
  cancel-in-progress: true

env:
  VERCEL_TEAM: teknoariels-projects

jobs:
  deploy:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: avalon-premier
            directory: apps/avalon-premier
            project: avalon-premier
          - label: avalon-propiedades
            directory: apps/avalon-propiedades
            project: avalonweb

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comprobar VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo '::error::Falta el secret VERCEL_TOKEN (GitHub → Settings → Secrets and variables → Actions)'
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      - name: Vercel link
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 link --yes \
            --project="${{ matrix.project }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel pull (production)
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 pull --yes \
            --environment=production \
            --token="$VERCEL_TOKEN"

      - name: Vercel build (prod)
        id: vbuild
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.ci-logs"
          npx vercel@50.32.3 build --prod \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN" 2>&1 | tee "${GITHUB_WORKSPACE}/.ci-logs/vercel-build-${{ matrix.label }}.log"

      - name: Upload Vercel build log on failure
        if: always() && steps.vbuild.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vercel-build-log-${{ matrix.label }}
          path: .ci-logs/vercel-build-${{ matrix.label }}.log

      - name: Vercel deploy (prebuilt prod)
        if: success()
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 deploy --prebuilt --prod --yes --logs \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"
