# Deploy a producción en Vercel (ambos sitios del monorepo).
# Secret: VERCEL_TOKEN (https://vercel.com/account/tokens)
#
# Flujo canónico Vercel + Actions: pull → build → deploy --prebuilt.
# - Todos los comandos desde la raíz del repo con --cwd al app (sube bien el monorepo: packages/, etc.).
# - No usar --git-config=false en pull (rompe con checkout típico de Actions).
# - NODE_OPTIONS en build reduce OOM en next/turbo.
# - deploy --logs deja trazas del lado Vercel en el log de GitHub si algo falla.
#
# Si `vercel deploy` remoto sin prebuilt falla por política de “git author”, este flujo evita depender de ese camino.

name: Deploy Vercel (Premier + Propiedades)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-monorepo
  cancel-in-progress: true

env:
  VERCEL_TEAM: teknoariels-projects

jobs:
  deploy:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: avalon-premier
            directory: apps/avalon-premier
            project: avalon-premier
          - label: avalon-propiedades
            directory: apps/avalon-propiedades
            project: avalonweb

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comprobar VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo '::error::Falta el secret VERCEL_TOKEN (GitHub → Settings → Secrets and variables → Actions)'
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      - name: Vercel link
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 link --yes \
            --cwd "${{ matrix.directory }}" \
            --project="${{ matrix.project }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel pull (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 pull --yes \
            --environment=production \
            --cwd "${{ matrix.directory }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel build (prod)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -eu
          npx vercel@50.32.3 build --prod \
            --cwd "${{ matrix.directory }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel deploy (prebuilt prod)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 deploy --prebuilt --prod --yes --logs \
            --cwd "${{ matrix.directory }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"
