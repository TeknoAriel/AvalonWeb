# Deploy a producción en Vercel (ambos sitios del monorepo).
# Un solo secret: VERCEL_TOKEN (https://vercel.com/account/tokens)
#
# Team y nombres de proyecto salen de tu dashboard (URL: vercel.com/<team>/<project>).
# Si falla el de propiedades, cambiá solo matrix.project para ese app.

name: Deploy Vercel (Premier + Propiedades)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-monorepo
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_TEAM: teknoariels-projects

jobs:
  deploy:
    # No uses `secrets` en `if` a nivel de job: GitHub no lo permite y el workflow ni siquiera encola (error al parsear).
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: avalon-premier
            directory: apps/avalon-premier
            project: avalon-premier
          - label: avalon-propiedades
            directory: apps/avalon-propiedades
            # Subdominio canónico avalonweb.vercel.app → slug suele ser avalonweb; si falla el link, probá avalon-propiedades
            project: avalonweb

    steps:
      - uses: actions/checkout@v4

      - name: Comprobar secret VERCEL_TOKEN
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo '::error::Falta el secret VERCEL_TOKEN (GitHub → Settings → Secrets and variables → Actions)'
          exit 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      # Pasos separados: en Actions ves exactamente qué falló (link vs build vs deploy).
      - name: Vercel link
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 link --yes \
            --project="${{ matrix.project }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel pull (env production)
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 pull --yes \
            --environment=production \
            --git-config=false \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel build (prod)
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 build --prod \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel deploy (prebuilt prod)
        working-directory: ${{ matrix.directory }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 deploy --prebuilt --prod --yes \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"
