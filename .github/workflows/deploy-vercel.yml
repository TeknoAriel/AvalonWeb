# Deploy a producción en Vercel (ambos sitios del monorepo).
# Secret: VERCEL_TOKEN (https://vercel.com/account/tokens)
#
# Estrategia: build remoto en Vercel (`vercel deploy --prod` sin --prebuilt).
# El flujo link + build local + deploy --prebuilt fallaba en el runner en `vercel build`;
# el build en los servidores de Vercel usa Root Directory + comandos del proyecto (vercel.json / dashboard).
#
# Team y slugs de proyecto: vercel.com/<team>/<slug>. Si falla link en propiedades, ajustá matrix.project.

name: Deploy Vercel (Premier + Propiedades)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-monorepo
  cancel-in-progress: true

env:
  VERCEL_TEAM: teknoariels-projects

jobs:
  deploy:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: avalon-premier
            directory: apps/avalon-premier
            project: avalon-premier
          - label: avalon-propiedades
            directory: apps/avalon-propiedades
            project: avalonweb

    steps:
      - uses: actions/checkout@v4

      - name: Comprobar VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo '::error::Falta el secret VERCEL_TOKEN (GitHub → Settings → Secrets and variables → Actions)'
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      # Desde la raíz del repo + --cwd: el upload incluye packages/ (monorepo). Si se corre solo dentro de apps/*, el deploy remoto suele fallar.
      - name: Vercel link
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 link --yes \
            --cwd "${{ matrix.directory }}" \
            --project="${{ matrix.project }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel deploy (prod, build en Vercel)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx vercel@50.32.3 deploy --prod --yes \
            --cwd "${{ matrix.directory }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"
