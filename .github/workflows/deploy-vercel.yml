# Deploy **avalon-premier** a producción: build en los servidores de Vercel (no `vercel build` en GitHub).
# Evita fallos del runner (spawn sh, OOM) y no depende del formato prebuilt local.
#
# Secret: VERCEL_TOKEN — https://vercel.com/account/tokens
# Proyecto Vercel: avalon-premier · Team: VERCEL_TEAM

name: Deploy Vercel (Premier)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-premier
  cancel-in-progress: true

env:
  VERCEL_TEAM: teknoariels-projects
  APP_DIR: apps/avalon-premier
  VERCEL_PROJECT: avalon-premier
  # Misma familia de CLI que usa el build en Vercel (evita diferencias de comportamiento).
  VERCEL_CLI_VERSION: '51.6.1'

jobs:
  deploy-premier:
    name: avalon-premier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Comprobar VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo '::error::Falta el secret VERCEL_TOKEN (Settings → Secrets and variables → Actions)'
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Vercel link
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eu
          npx "vercel@${{ env.VERCEL_CLI_VERSION }}" link --yes \
            --cwd "${{ env.APP_DIR }}" \
            --project="${{ env.VERCEL_PROJECT }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"

      - name: Vercel deploy (prod — build remoto en Vercel)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PATH: /bin:/usr/bin:/usr/local/bin:${{ env.PATH }}
        run: |
          set -eu
          npx "vercel@${{ env.VERCEL_CLI_VERSION }}" deploy --prod --yes --logs \
            --cwd "${{ env.APP_DIR }}" \
            --scope="${{ env.VERCEL_TEAM }}" \
            --token="$VERCEL_TOKEN"
