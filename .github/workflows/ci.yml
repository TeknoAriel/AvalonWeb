name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Snapshot Premier (repo)
        run: pnpm check:premier-snapshot

      - name: Ingesta KiteProp live (si hay secret)
        env:
          KITEPROP_API_KEY: ${{ secrets.KITEPROP_API_KEY }}
          KITEPROP_API_TOKEN: ${{ secrets.KITEPROP_API_TOKEN }}
          INGEST_STATS_OUT: ${{ github.workspace }}/ingest-report.json
          MIN_INGEST_TOTAL_ROWS: ${{ vars.MIN_INGEST_TOTAL_ROWS }}
          MIN_PREMIER_TAG_COUNT: ${{ vars.MIN_PREMIER_TAG_COUNT }}
        run: pnpm ci:verify-ingest

      - name: Artefacto reporte ingesta
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kiteprop-ingest-report
          path: ingest-report.json
          if-no-files-found: ignore
